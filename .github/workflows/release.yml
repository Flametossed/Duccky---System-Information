name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows portable exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "Duccky-portable"
          --icon logo.ico
          --add-data "logo.png;."
          --add-data "logo.ico;."
          --collect-all customtkinter
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: Duccky-Windows
          path: dist/Duccky-portable.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev libfuse2

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: >
          pyinstaller
          --onefile
          --name "Duccky"
          --add-data "logo.png:."
          --add-data "logo.ico:."
          --collect-all customtkinter
          main.py

      - name: Create tar.gz portable
        run: |
          mkdir -p Duccky-portable-linux
          cp dist/Duccky Duccky-portable-linux/Duccky
          cp logo.png Duccky-portable-linux/logo.png
          chmod +x Duccky-portable-linux/Duccky
          tar -czf Duccky-portable-linux-x86_64.tar.gz Duccky-portable-linux/

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/Duccky AppDir/usr/bin/Duccky
          cp logo.png AppDir/logo.png

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexec "${HERE}/usr/bin/Duccky" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          printf '[Desktop Entry]\nType=Application\nName=Duccky\nExec=Duccky\nIcon=logo\nCategories=Utility;System;\nComment=System Information Viewer\n' > AppDir/Duccky.desktop

      - name: Build AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir Duccky-portable-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Duccky-Linux-AppImage
          path: Duccky-portable-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Duccky-Linux-tar
          path: Duccky-portable-linux-x86_64.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Duccky-Windows
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: Duccky-Linux-AppImage
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: Duccky-Linux-tar
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Duccky-portable.exe
            artifacts/Duccky-portable-x86_64.AppImage
            artifacts/Duccky-portable-linux-x86_64.tar.gz
          generate_release_notes: true
